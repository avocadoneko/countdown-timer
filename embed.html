<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: transparent;
    color: #1a1a2e;
    overflow: hidden;
  }

  .container {
    text-align: center;
    padding: 24px;
    width: 100%;
    max-width: 600px;
  }

  .event-name {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: #16213e;
    letter-spacing: 0.02em;
  }

  .countdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .unit {
    background: #f0f0f5;
    border-radius: 12px;
    padding: 16px 12px;
    min-width: 80px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .unit .value {
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    color: #0f3460;
    font-variant-numeric: tabular-nums;
  }

  .unit .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-top: 6px;
  }

  .finished {
    font-size: 1.6rem;
    font-weight: 700;
    color: #e94560;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .error-msg {
    color: #999;
    font-size: 0.95rem;
  }

  /* Notion embed friendly sizing */
  @media (max-width: 400px) {
    .unit { min-width: 60px; padding: 12px 8px; }
    .unit .value { font-size: 1.8rem; }
    .event-name { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <p class="error-msg">No event configured.</p>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const date = params.get('date');

  if (!name || !date) {
    return;
  }

  const targetDate = new Date(date);
  if (isNaN(targetDate.getTime())) {
    document.getElementById('app').innerHTML = '<p class="error-msg">Invalid date.</p>';
    return;
  }

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="event-name">${escapeHtml(name)}</div>
    <div class="countdown" id="countdown"></div>
  `;

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function update() {
    const now = new Date();
    const diff = targetDate - now;
    const el = document.getElementById('countdown');

    if (diff <= 0) {
      el.innerHTML = '<div class="finished">Event Started!</div>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    el.innerHTML = `
      <div class="unit"><div class="value">${days}</div><div class="label">Days</div></div>
      <div class="unit"><div class="value">${String(hours).padStart(2, '0')}</div><div class="label">Hours</div></div>
      <div class="unit"><div class="value">${String(minutes).padStart(2, '0')}</div><div class="label">Min</div></div>
      <div class="unit"><div class="value">${String(seconds).padStart(2, '0')}</div><div class="label">Sec</div></div>
    `;
  }

  update();
  setInterval(update, 1000);
})();
</script>
</body>
</html>
