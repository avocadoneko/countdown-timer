<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: transparent;
    color: #1a1a2e;
    overflow: hidden;
  }

  .container {
    text-align: center;
    padding: 24px;
    width: 100%;
    max-width: 600px;
  }

  .event-name {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: #16213e;
    letter-spacing: 0.02em;
  }

  .countdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .unit {
    background: #f0f0f5;
    border-radius: 12px;
    padding: 16px 12px;
    min-width: 80px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .unit .value {
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    color: #0f3460;
    font-variant-numeric: tabular-nums;
  }

  .unit .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-top: 6px;
  }

  .finished {
    font-size: 1.6rem;
    font-weight: 700;
    color: #e94560;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .error-msg {
    color: #999;
    font-size: 0.95rem;
  }

  /* Weather */
  .weather {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #f0f0f5;
    border-radius: 10px;
    padding: 10px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .weather-icon {
    font-size: 1.6rem;
    line-height: 1;
  }

  .weather-info {
    text-align: left;
  }

  .weather-desc {
    font-size: 0.8rem;
    color: #555;
    font-weight: 600;
  }

  .weather-temp {
    font-size: 0.85rem;
    color: #0f3460;
    font-weight: 700;
    margin-top: 1px;
  }

  .weather-location {
    font-size: 0.7rem;
    color: #999;
    margin-top: 1px;
  }

  .weather-note {
    margin-top: 14px;
    font-size: 0.75rem;
    color: #aaa;
  }

  /* Notion embed friendly sizing */
  @media (max-width: 400px) {
    .unit { min-width: 60px; padding: 12px 8px; }
    .unit .value { font-size: 1.8rem; }
    .event-name { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <p class="error-msg">No event configured.</p>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const date = params.get('date');
  const location = params.get('location');

  if (!name || !date) {
    return;
  }

  const targetDate = new Date(date);
  if (isNaN(targetDate.getTime())) {
    document.getElementById('app').innerHTML = '<p class="error-msg">Invalid date.</p>';
    return;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="event-name">${escapeHtml(name)}</div>
    <div class="countdown" id="countdown"></div>
    <div id="weather-container"></div>
  `;

  // --- Countdown ---
  function update() {
    const now = new Date();
    const diff = targetDate - now;
    const el = document.getElementById('countdown');

    if (diff <= 0) {
      el.innerHTML = '<div class="finished">Event Started!</div>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    el.innerHTML = `
      <div class="unit"><div class="value">${days}</div><div class="label">Days</div></div>
      <div class="unit"><div class="value">${String(hours).padStart(2, '0')}</div><div class="label">Hours</div></div>
      <div class="unit"><div class="value">${String(minutes).padStart(2, '0')}</div><div class="label">Min</div></div>
      <div class="unit"><div class="value">${String(seconds).padStart(2, '0')}</div><div class="label">Sec</div></div>
    `;
  }

  update();
  setInterval(update, 1000);

  // --- Weather ---
  if (!location) return;

  // WMO code -> [日本語, emoji, カテゴリ]
  // カテゴリ: 'clear','cloudy','rain','snow','storm','fog' で「のち」判定に使う
  const WMO = {
    0:  ['\u6674\u308C',           '\u2600\uFE0F',           'clear'],
    1:  ['\u6674\u308C',           '\uD83C\uDF24\uFE0F',     'clear'],
    2:  ['\u66C7\u308A',           '\u26C5',                  'cloudy'],
    3:  ['\u66C7\u308A',           '\u2601\uFE0F',            'cloudy'],
    45: ['\u9727',                 '\uD83C\uDF2B\uFE0F',     'fog'],
    48: ['\u9727',                 '\uD83C\uDF2B\uFE0F',     'fog'],
    51: ['\u5C0F\u96E8',           '\uD83C\uDF26\uFE0F',     'rain'],
    53: ['\u96E8',                 '\uD83C\uDF27\uFE0F',     'rain'],
    55: ['\u5F37\u3044\u96E8',     '\uD83C\uDF27\uFE0F',     'rain'],
    56: ['\u51CD\u96E8',           '\uD83C\uDF27\uFE0F',     'rain'],
    57: ['\u5F37\u3044\u51CD\u96E8','\uD83C\uDF27\uFE0F',    'rain'],
    61: ['\u5C0F\u96E8',           '\uD83C\uDF26\uFE0F',     'rain'],
    63: ['\u96E8',                 '\uD83C\uDF27\uFE0F',     'rain'],
    65: ['\u5927\u96E8',           '\uD83C\uDF27\uFE0F',     'rain'],
    66: ['\u51CD\u96E8',           '\uD83C\uDF27\uFE0F',     'rain'],
    67: ['\u5F37\u3044\u51CD\u96E8','\uD83C\uDF27\uFE0F',    'rain'],
    71: ['\u5C0F\u96EA',           '\uD83C\uDF28\uFE0F',     'snow'],
    73: ['\u96EA',                 '\u2744\uFE0F',            'snow'],
    75: ['\u5927\u96EA',           '\u2744\uFE0F',            'snow'],
    77: ['\u96EA',                 '\u2744\uFE0F',            'snow'],
    80: ['\u306B\u308F\u304B\u96E8','\uD83C\uDF26\uFE0F',    'rain'],
    81: ['\u96E8',                 '\uD83C\uDF27\uFE0F',     'rain'],
    82: ['\u5F37\u3044\u96E8',     '\u26C8\uFE0F',           'rain'],
    85: ['\u306B\u308F\u304B\u96EA','\uD83C\uDF28\uFE0F',    'snow'],
    86: ['\u5F37\u3044\u96EA',     '\uD83C\uDF28\uFE0F',     'snow'],
    95: ['\u96F7\u96E8',           '\u26A1',                  'storm'],
    96: ['\u96F7\u96E8',           '\u26A1',                  'storm'],
    99: ['\u6FC0\u3057\u3044\u96F7\u96E8','\u26A1',           'storm']
  };

  function getWmo(code) { return WMO[code] || ['\u4E0D\u660E', '\uD83C\uDF10', 'unknown']; }

  // 時間帯別コードから「晴れのち曇り」形式の説明文を作る
  function summarizeHourly(codes) {
    // 6-12時 = 午前, 12-18時 = 午後 として前半/後半に分ける
    const first = codes.slice(0, Math.ceil(codes.length / 2));
    const second = codes.slice(Math.ceil(codes.length / 2));

    function dominant(arr) {
      const freq = {};
      arr.forEach(c => { const cat = getWmo(c)[2]; freq[cat] = (freq[cat] || 0) + 1; });
      return Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
    }

    function catToLabel(cat) {
      const map = { clear: '\u6674\u308C', cloudy: '\u66C7\u308A', rain: '\u96E8', snow: '\u96EA', storm: '\u96F7\u96E8', fog: '\u9727' };
      return map[cat] || '\u4E0D\u660E';
    }

    function catToIcon(cat) {
      const map = { clear: '\u2600\uFE0F', cloudy: '\u2601\uFE0F', rain: '\uD83C\uDF27\uFE0F', snow: '\u2744\uFE0F', storm: '\u26A1', fog: '\uD83C\uDF2B\uFE0F' };
      return map[cat] || '\uD83C\uDF10';
    }

    const catFirst = dominant(first);
    const catSecond = dominant(second);

    if (catFirst === catSecond) {
      return { desc: catToLabel(catFirst), icon: catToIcon(catFirst) };
    }
    // 「晴れのち曇り」形式
    return { desc: catToLabel(catFirst) + '\u306E\u3061' + catToLabel(catSecond), icon: catToIcon(catFirst) };
  }

  async function fetchWeather() {
    const container = document.getElementById('weather-container');

    try {
      // 1. Geocode (タイムゾーン情報も取得)
      const geoRes = await fetch(
        'https://geocoding-api.open-meteo.com/v1/search?name=' +
        encodeURIComponent(location) + '&count=1&language=en'
      );
      const geoData = await geoRes.json();

      if (!geoData.results || geoData.results.length === 0) {
        container.innerHTML = '<div class="weather-note">\u5834\u6240\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093</div>';
        return;
      }

      const { latitude, longitude, name: cityName, country, timezone } = geoData.results[0];

      // URLパラメータの日付文字列から直接日付部分を取得（UTC変換による日付ズレを防ぐ）
      const eventDateStr = date.slice(0, 10);

      // 2. 予報範囲チェック（16日先まで）
      const now = new Date();
      const diffDays = Math.floor((targetDate - now) / (1000 * 60 * 60 * 24));

      if (diffDays > 16) {
        container.innerHTML = `
          <div class="weather-note">
            ${escapeHtml(cityName)} \u306E\u5929\u6C17\u4E88\u5831\u306F\u30A4\u30D9\u30F3\u30C816\u65E5\u524D\u304B\u3089\u8868\u793A\u3055\u308C\u307E\u3059
          </div>`;
        return;
      }

      if (diffDays < 0) return;

      // 3. 時間帯別天気 + 日別気温を取得（開催地タイムゾーンを明示指定）
      const weatherRes = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=' + latitude +
        '&longitude=' + longitude +
        '&daily=temperature_2m_max,temperature_2m_min' +
        '&hourly=weather_code' +
        '&timezone=' + encodeURIComponent(timezone || 'auto') +
        '&start_date=' + eventDateStr +
        '&end_date=' + eventDateStr
      );
      const weatherData = await weatherRes.json();

      if (!weatherData.daily || !weatherData.hourly) {
        container.innerHTML = '<div class="weather-note">\u5929\u6C17\u30C7\u30FC\u30BF\u3092\u53D6\u5F97\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F</div>';
        return;
      }

      const tempMax = Math.round(weatherData.daily.temperature_2m_max[0]);
      const tempMin = Math.round(weatherData.daily.temperature_2m_min[0]);

      // 6:00〜18:00 の時間帯コードで日中の天気を判定
      const hourlyCodes = weatherData.hourly.weather_code;
      const daytimeCodes = hourlyCodes.slice(6, 18);
      const { desc, icon } = summarizeHourly(daytimeCodes);

      container.innerHTML = `
        <div class="weather">
          <div class="weather-icon">${icon}</div>
          <div class="weather-info">
            <div class="weather-desc">${desc}</div>
            <div class="weather-temp">${tempMin}\u00B0C / ${tempMax}\u00B0C</div>
            <div class="weather-location">${escapeHtml(cityName)}, ${escapeHtml(country)}</div>
          </div>
        </div>
      `;
    } catch {
      container.innerHTML = '<div class="weather-note">\u5929\u6C17\u30C7\u30FC\u30BF\u3092\u53D6\u5F97\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F</div>';
    }
  }

  fetchWeather();
})();
</script>
</body>
</html>
