<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
    background: #FFFFFF;
    color: #1e293b;
    overflow: hidden;
  }

  /* Background image mode */
  body.has-bgimage {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  body.has-bgimage::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 0;
  }

  body.has-bgimage .container { position: relative; z-index: 1; }

  /* Dark mode (for dark bg colors or bg image) */
  body.dark { color: #f1f5f9; }
  body.dark .event-name { color: #fff; }
  body.dark .event-date { color: rgba(255,255,255,0.7); }
  body.dark .divider { background: rgba(255,255,255,0.4); }
  body.dark .unit {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
  }
  body.dark .unit .value { color: #fff; }
  body.dark .unit .label { color: rgba(255,255,255,0.6); }
  body.dark .separator { color: rgba(255,255,255,0.35); }
  body.dark .weather-card {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
  }
  body.dark .weather-label { color: rgba(255,255,255,0.6); }
  body.dark .weather-desc { color: #fff; }
  body.dark .weather-note { color: rgba(255,255,255,0.5); }
  body.dark .finished { color: #fbbf24; }
  body.dark .finished .sub { color: rgba(255,255,255,0.6); }

  .container {
    text-align: center;
    padding: 28px 24px;
    width: 100%;
    max-width: 520px;
  }

  .event-header { margin-bottom: 24px; }

  .event-name {
    font-size: 1.3rem;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .event-date {
    margin-top: 6px;
    font-size: 0.82rem;
    color: #64748b;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .countdown {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .unit {
    flex: 1;
    max-width: 90px;
    background: linear-gradient(145deg, #f8fafc, #f1f5f9);
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 14px 4px 12px;
  }

  .unit .value {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    color: #1e293b;
    font-variant-numeric: tabular-nums;
  }

  .unit .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #94a3b8;
    margin-top: 6px;
    font-weight: 600;
  }

  .separator {
    display: flex;
    align-items: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: #cbd5e1;
    padding-bottom: 8px;
  }

  .finished {
    font-size: 1.3rem;
    font-weight: 700;
    color: #8b5cf6;
    padding: 20px 0;
  }

  .finished .sub {
    font-size: 0.85rem;
    color: #94a3b8;
    font-weight: 500;
    margin-top: 4px;
  }

  .weather-section { margin-top: 20px; }

  .weather-card {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(145deg, #f8fafc, #f1f5f9);
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 20px;
  }

  .weather-icon { font-size: 1.8rem; line-height: 1; }

  .weather-body { text-align: left; }

  .weather-label {
    font-size: 0.65rem;
    color: #94a3b8;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }

  .weather-desc {
    font-size: 0.88rem;
    color: #1e293b;
    font-weight: 700;
  }

  .weather-note {
    margin-top: 16px;
    font-size: 0.72rem;
    color: #94a3b8;
    font-weight: 500;
  }

  .error-msg { color: #94a3b8; font-size: 0.9rem; }

  @media (max-width: 400px) {
    .container { padding: 20px 16px; }
    .unit { padding: 12px 2px 10px; border-radius: 10px; }
    .unit .value { font-size: 1.6rem; }
    .event-name { font-size: 1.1rem; }
    .separator { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <p class="error-msg">No event configured.</p>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const date = params.get('date');
  const location = params.get('location');
  const bg = params.get('bg');
  const bgimage = params.get('bgimage');

  if (!name || !date) return;

  const targetDate = new Date(date);
  if (isNaN(targetDate.getTime())) {
    document.getElementById('app').innerHTML = '<p class="error-msg">Invalid date.</p>';
    return;
  }

  // --- Apply background ---
  const DARK_COLORS = ['38618C', '35A7FF'];
  const body = document.body;

  if (bgimage) {
    body.style.backgroundImage = 'url(' + CSS.escape(bgimage) + ')';
    body.classList.add('has-bgimage', 'dark');
  } else if (bg) {
    body.style.background = '#' + bg;
    if (DARK_COLORS.includes(bg)) body.classList.add('dark');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const WEEKDAYS = ['\u65E5', '\u6708', '\u706B', '\u6C34', '\u6728', '\u91D1', '\u571F'];

  function formatEventDate(d) {
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = WEEKDAYS[d.getDay()];
    const h = String(d.getHours()).padStart(2, '0');
    return `${y}\u5E74${m}\u6708${day}\u65E5(${w}) ${h}:00`;
  }

  function formatWeatherDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = WEEKDAYS[d.getDay()];
    return `${m}/${day}(${w})`;
  }

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="event-header">
      <div class="event-name">${escapeHtml(name)}</div>
      <div class="event-date">${formatEventDate(targetDate)}</div>
    </div>
    <div class="divider"></div>
    <div id="countdown" class="countdown"></div>
    <div id="weather-container" class="weather-section"></div>
  `;

  // --- Countdown ---
  function update() {
    const now = new Date();
    const diff = targetDate - now;
    const el = document.getElementById('countdown');

    if (diff <= 0) {
      el.innerHTML = '<div class="finished">Event Started!<div class="sub">' + formatEventDate(targetDate) + '</div></div>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    el.innerHTML = `
      <div class="unit"><div class="value">${days}</div><div class="label">Days</div></div>
      <div class="separator">:</div>
      <div class="unit"><div class="value">${String(hours).padStart(2, '0')}</div><div class="label">Hours</div></div>
      <div class="separator">:</div>
      <div class="unit"><div class="value">${String(minutes).padStart(2, '0')}</div><div class="label">Min</div></div>
      <div class="separator">:</div>
      <div class="unit"><div class="value">${String(seconds).padStart(2, '0')}</div><div class="label">Sec</div></div>
    `;
  }

  update();
  setInterval(update, 1000);

  // --- Weather ---
  if (!location) return;

  const WMO = {
    0:  ['\u6674\u308C',           '\u2600\uFE0F',           'clear'],
    1:  ['\u6674\u308C',           '\uD83C\uDF24\uFE0F',     'clear'],
    2:  ['\u66C7\u308A',           '\u26C5',                  'cloudy'],
    3:  ['\u66C7\u308A',           '\u2601\uFE0F',            'cloudy'],
    45: ['\u9727',                 '\uD83C\uDF2B\uFE0F',     'fog'],
    48: ['\u9727',                 '\uD83C\uDF2B\uFE0F',     'fog'],
    51: ['\u5C0F\u96E8',           '\uD83C\uDF26\uFE0F',     'rain'],
    53: ['\u96E8',                 '\uD83C\uDF27\uFE0F',     'rain'],
    55: ['\u5F37\u3044\u96E8',     '\uD83C\uDF27\uFE0F',     'rain'],
    56: ['\u51CD\u96E8',           '\uD83C\uDF27\uFE0F',     'rain'],
    57: ['\u5F37\u3044\u51CD\u96E8','\uD83C\uDF27\uFE0F',    'rain'],
    61: ['\u5C0F\u96E8',           '\uD83C\uDF26\uFE0F',     'rain'],
    63: ['\u96E8',                 '\uD83C\uDF27\uFE0F',     'rain'],
    65: ['\u5927\u96E8',           '\uD83C\uDF27\uFE0F',     'rain'],
    66: ['\u51CD\u96E8',           '\uD83C\uDF27\uFE0F',     'rain'],
    67: ['\u5F37\u3044\u51CD\u96E8','\uD83C\uDF27\uFE0F',    'rain'],
    71: ['\u5C0F\u96EA',           '\uD83C\uDF28\uFE0F',     'snow'],
    73: ['\u96EA',                 '\u2744\uFE0F',            'snow'],
    75: ['\u5927\u96EA',           '\u2744\uFE0F',            'snow'],
    77: ['\u96EA',                 '\u2744\uFE0F',            'snow'],
    80: ['\u306B\u308F\u304B\u96E8','\uD83C\uDF26\uFE0F',    'rain'],
    81: ['\u96E8',                 '\uD83C\uDF27\uFE0F',     'rain'],
    82: ['\u5F37\u3044\u96E8',     '\u26C8\uFE0F',           'rain'],
    85: ['\u306B\u308F\u304B\u96EA','\uD83C\uDF28\uFE0F',    'snow'],
    86: ['\u5F37\u3044\u96EA',     '\uD83C\uDF28\uFE0F',     'snow'],
    95: ['\u96F7\u96E8',           '\u26A1',                  'storm'],
    96: ['\u96F7\u96E8',           '\u26A1',                  'storm'],
    99: ['\u6FC0\u3057\u3044\u96F7\u96E8','\u26A1',           'storm']
  };

  function getWmo(code) { return WMO[code] || ['\u4E0D\u660E', '\uD83C\uDF10', 'unknown']; }

  function summarizeHourly(codes) {
    const first = codes.slice(0, Math.ceil(codes.length / 2));
    const second = codes.slice(Math.ceil(codes.length / 2));

    function dominant(arr) {
      const freq = {};
      arr.forEach(c => { const cat = getWmo(c)[2]; freq[cat] = (freq[cat] || 0) + 1; });
      return Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
    }

    function catToLabel(cat) {
      const map = { clear: '\u6674\u308C', cloudy: '\u66C7\u308A', rain: '\u96E8', snow: '\u96EA', storm: '\u96F7\u96E8', fog: '\u9727' };
      return map[cat] || '\u4E0D\u660E';
    }

    function catToIcon(cat) {
      const map = { clear: '\u2600\uFE0F', cloudy: '\u2601\uFE0F', rain: '\uD83C\uDF27\uFE0F', snow: '\u2744\uFE0F', storm: '\u26A1', fog: '\uD83C\uDF2B\uFE0F' };
      return map[cat] || '\uD83C\uDF10';
    }

    const catFirst = dominant(first);
    const catSecond = dominant(second);

    if (catFirst === catSecond) {
      return { desc: catToLabel(catFirst), icon: catToIcon(catFirst) };
    }
    return { desc: catToLabel(catFirst) + '\u306E\u3061' + catToLabel(catSecond), icon: catToIcon(catFirst) };
  }

  async function fetchWeather() {
    const container = document.getElementById('weather-container');

    try {
      const geoRes = await fetch(
        'https://geocoding-api.open-meteo.com/v1/search?name=' +
        encodeURIComponent(location) + '&count=1&language=en'
      );
      const geoData = await geoRes.json();

      if (!geoData.results || geoData.results.length === 0) {
        container.innerHTML = '<div class="weather-note">\u5834\u6240\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093</div>';
        return;
      }

      const { latitude, longitude, name: cityName, country, timezone } = geoData.results[0];
      const eventDateStr = date.slice(0, 10);

      const now = new Date();
      const diffDays = Math.floor((targetDate - now) / (1000 * 60 * 60 * 24));

      if (diffDays > 16) {
        container.innerHTML = `
          <div class="weather-note">
            ${escapeHtml(cityName)} \u306E\u5929\u6C17\u4E88\u5831\u306F\u30A4\u30D9\u30F3\u30C816\u65E5\u524D\u304B\u3089\u8868\u793A\u3055\u308C\u307E\u3059
          </div>`;
        return;
      }

      if (diffDays < 0) return;

      const weatherRes = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=' + latitude +
        '&longitude=' + longitude +
        '&daily=temperature_2m_max,temperature_2m_min' +
        '&hourly=weather_code' +
        '&timezone=' + encodeURIComponent(timezone || 'auto') +
        '&start_date=' + eventDateStr +
        '&end_date=' + eventDateStr
      );
      const weatherData = await weatherRes.json();

      if (!weatherData.daily || !weatherData.hourly) {
        container.innerHTML = '<div class="weather-note">\u5929\u6C17\u30C7\u30FC\u30BF\u3092\u53D6\u5F97\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F</div>';
        return;
      }

      const tempMax = Math.round(weatherData.daily.temperature_2m_max[0]);
      const tempMin = Math.round(weatherData.daily.temperature_2m_min[0]);

      const hourlyCodes = weatherData.hourly.weather_code;
      const daytimeCodes = hourlyCodes.slice(6, 18);
      const { desc, icon } = summarizeHourly(daytimeCodes);

      const dateLabel = formatWeatherDate(eventDateStr);

      container.innerHTML = `
        <div class="weather-card">
          <div class="weather-icon">${icon}</div>
          <div class="weather-body">
            <div class="weather-label">${dateLabel} ${escapeHtml(cityName)} \u306E\u5929\u6C17</div>
            <div class="weather-desc">${desc} ${tempMin}\u00B0 / ${tempMax}\u00B0</div>
          </div>
        </div>
      `;
    } catch {
      container.innerHTML = '<div class="weather-note">\u5929\u6C17\u30C7\u30FC\u30BF\u3092\u53D6\u5F97\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F</div>';
    }
  }

  fetchWeather();
})();
</script>
</body>
</html>
