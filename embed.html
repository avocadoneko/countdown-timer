<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: transparent;
    color: #1a1a2e;
    overflow: hidden;
  }

  .container {
    text-align: center;
    padding: 24px;
    width: 100%;
    max-width: 600px;
  }

  .event-name {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: #16213e;
    letter-spacing: 0.02em;
  }

  .countdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .unit {
    background: #f0f0f5;
    border-radius: 12px;
    padding: 16px 12px;
    min-width: 80px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .unit .value {
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    color: #0f3460;
    font-variant-numeric: tabular-nums;
  }

  .unit .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-top: 6px;
  }

  .finished {
    font-size: 1.6rem;
    font-weight: 700;
    color: #e94560;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .error-msg {
    color: #999;
    font-size: 0.95rem;
  }

  /* Weather */
  .weather {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #f0f0f5;
    border-radius: 10px;
    padding: 10px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .weather-icon {
    font-size: 1.6rem;
    line-height: 1;
  }

  .weather-info {
    text-align: left;
  }

  .weather-desc {
    font-size: 0.8rem;
    color: #555;
    font-weight: 600;
  }

  .weather-temp {
    font-size: 0.85rem;
    color: #0f3460;
    font-weight: 700;
    margin-top: 1px;
  }

  .weather-location {
    font-size: 0.7rem;
    color: #999;
    margin-top: 1px;
  }

  .weather-note {
    margin-top: 14px;
    font-size: 0.75rem;
    color: #aaa;
  }

  /* Notion embed friendly sizing */
  @media (max-width: 400px) {
    .unit { min-width: 60px; padding: 12px 8px; }
    .unit .value { font-size: 1.8rem; }
    .event-name { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <p class="error-msg">No event configured.</p>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const date = params.get('date');
  const location = params.get('location');

  if (!name || !date) {
    return;
  }

  const targetDate = new Date(date);
  if (isNaN(targetDate.getTime())) {
    document.getElementById('app').innerHTML = '<p class="error-msg">Invalid date.</p>';
    return;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="event-name">${escapeHtml(name)}</div>
    <div class="countdown" id="countdown"></div>
    <div id="weather-container"></div>
  `;

  // --- Countdown ---
  function update() {
    const now = new Date();
    const diff = targetDate - now;
    const el = document.getElementById('countdown');

    if (diff <= 0) {
      el.innerHTML = '<div class="finished">Event Started!</div>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    el.innerHTML = `
      <div class="unit"><div class="value">${days}</div><div class="label">Days</div></div>
      <div class="unit"><div class="value">${String(hours).padStart(2, '0')}</div><div class="label">Hours</div></div>
      <div class="unit"><div class="value">${String(minutes).padStart(2, '0')}</div><div class="label">Min</div></div>
      <div class="unit"><div class="value">${String(seconds).padStart(2, '0')}</div><div class="label">Sec</div></div>
    `;
  }

  update();
  setInterval(update, 1000);

  // --- Weather ---
  if (!location) return;

  const WMO_CODES = {
    0: ['Clear', '\u2600\uFE0F'],
    1: ['Mostly Clear', '\uD83C\uDF24\uFE0F'],
    2: ['Partly Cloudy', '\u26C5'],
    3: ['Overcast', '\u2601\uFE0F'],
    45: ['Fog', '\uD83C\uDF2B\uFE0F'],
    48: ['Rime Fog', '\uD83C\uDF2B\uFE0F'],
    51: ['Light Drizzle', '\uD83C\uDF26\uFE0F'],
    53: ['Drizzle', '\uD83C\uDF26\uFE0F'],
    55: ['Heavy Drizzle', '\uD83C\uDF27\uFE0F'],
    56: ['Freezing Drizzle', '\uD83C\uDF27\uFE0F'],
    57: ['Heavy Freezing Drizzle', '\uD83C\uDF27\uFE0F'],
    61: ['Light Rain', '\uD83C\uDF26\uFE0F'],
    63: ['Rain', '\uD83C\uDF27\uFE0F'],
    65: ['Heavy Rain', '\uD83C\uDF27\uFE0F'],
    66: ['Freezing Rain', '\uD83C\uDF27\uFE0F'],
    67: ['Heavy Freezing Rain', '\uD83C\uDF27\uFE0F'],
    71: ['Light Snow', '\uD83C\uDF28\uFE0F'],
    73: ['Snow', '\u2744\uFE0F'],
    75: ['Heavy Snow', '\u2744\uFE0F'],
    77: ['Snow Grains', '\u2744\uFE0F'],
    80: ['Light Showers', '\uD83C\uDF26\uFE0F'],
    81: ['Showers', '\uD83C\uDF27\uFE0F'],
    82: ['Heavy Showers', '\u26C8\uFE0F'],
    85: ['Light Snow Showers', '\uD83C\uDF28\uFE0F'],
    86: ['Heavy Snow Showers', '\uD83C\uDF28\uFE0F'],
    95: ['Thunderstorm', '\u26A1'],
    96: ['Thunderstorm + Hail', '\u26A1'],
    99: ['Thunderstorm + Heavy Hail', '\u26A1']
  };

  async function fetchWeather() {
    const container = document.getElementById('weather-container');

    try {
      // 1. Geocode
      const geoRes = await fetch(
        'https://geocoding-api.open-meteo.com/v1/search?name=' +
        encodeURIComponent(location) + '&count=1&language=en'
      );
      const geoData = await geoRes.json();

      if (!geoData.results || geoData.results.length === 0) {
        container.innerHTML = '<div class="weather-note">Location not found</div>';
        return;
      }

      const { latitude, longitude, name: cityName, country } = geoData.results[0];
      const eventDateStr = targetDate.toISOString().slice(0, 10);

      // 2. Check if within forecast range (16 days)
      const now = new Date();
      const diffDays = Math.floor((targetDate - now) / (1000 * 60 * 60 * 24));

      if (diffDays > 16) {
        container.innerHTML = `
          <div class="weather-note">
            ${escapeHtml(cityName)} の天気予報はイベント16日前から表示されます
          </div>`;
        return;
      }

      if (diffDays < 0) {
        // Event already passed — no weather needed
        return;
      }

      // 3. Fetch forecast
      const weatherRes = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=' + latitude +
        '&longitude=' + longitude +
        '&daily=weather_code,temperature_2m_max,temperature_2m_min' +
        '&timezone=auto&start_date=' + eventDateStr +
        '&end_date=' + eventDateStr
      );
      const weatherData = await weatherRes.json();

      if (!weatherData.daily || !weatherData.daily.weather_code) {
        container.innerHTML = '<div class="weather-note">Weather data unavailable</div>';
        return;
      }

      const code = weatherData.daily.weather_code[0];
      const tempMax = Math.round(weatherData.daily.temperature_2m_max[0]);
      const tempMin = Math.round(weatherData.daily.temperature_2m_min[0]);
      const [desc, icon] = WMO_CODES[code] || ['Unknown', '\uD83C\uDF10'];

      container.innerHTML = `
        <div class="weather">
          <div class="weather-icon">${icon}</div>
          <div class="weather-info">
            <div class="weather-desc">${desc}</div>
            <div class="weather-temp">${tempMin}\u00B0C / ${tempMax}\u00B0C</div>
            <div class="weather-location">${escapeHtml(cityName)}, ${escapeHtml(country)}</div>
          </div>
        </div>
      `;
    } catch {
      container.innerHTML = '<div class="weather-note">Weather data unavailable</div>';
    }
  }

  fetchWeather();
})();
</script>
</body>
</html>
