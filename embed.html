<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
    background: #1a1a2e;
    color: #fff;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    padding: 24px 32px;
  }

  /* Header */
  .event-name {
    font-size: 1.3rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.01em;
    line-height: 1.3;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3);
  }

  .event-date {
    margin-top: 4px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
    letter-spacing: 0.03em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }

  /* Countdown */
  .countdown {
    display: flex;
    gap: 4px;
    justify-content: center;
    align-items: baseline;
    margin-top: 16px;
  }

  .unit {
    text-align: center;
    padding: 0 10px;
  }

  .unit .value {
    font-size: 2.8rem;
    font-weight: 800;
    line-height: 1;
    color: #fff;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3);
  }

  .unit .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .separator {
    display: flex;
    align-items: center;
    font-size: 1.8rem;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    padding-bottom: 12px;
  }

  /* Finished */
  .finished {
    font-size: 1.2rem;
    font-weight: 700;
    color: #fbbf24;
    padding: 18px 0;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .finished .sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
    margin-top: 4px;
  }

  /* Weather */
  .weather-section { margin-top: 14px; }

  .weather-info {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }

  .weather-icon { font-size: 1.2rem; line-height: 1; }

  .weather-note {
    margin-top: 14px;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .error-msg { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="container" id="app">
  <p class="error-msg">No event configured.</p>
</div>
<script>
(function() {
  const PRESETS = {
    ocean:    'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200&q=80',
    mountain: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80',
    sunset:   'https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=1200&q=80',
    forest:   'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200&q=80',
    aurora:   'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1200&q=80',
    city:     'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=1200&q=80'
  };

  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const date = params.get('date');
  const location = params.get('location');
  const bgPreset = params.get('bg');
  const bgKey = params.get('bgkey');

  // Apply background
  const bgEl = document.getElementById('bg');
  if (bgKey) {
    var storedBg = localStorage.getItem('countdown_bg_' + bgKey);
    if (storedBg) {
      bgEl.style.backgroundImage = 'url(' + storedBg + ')';
    } else {
      bgEl.style.backgroundImage = 'url(' + PRESETS.ocean + ')';
    }
  } else if (bgPreset && PRESETS[bgPreset]) {
    bgEl.style.backgroundImage = 'url(' + PRESETS[bgPreset] + ')';
  } else {
    bgEl.style.backgroundImage = 'url(' + PRESETS.ocean + ')';
  }

  if (!name || !date) return;

  const targetDate = new Date(date);
  if (isNaN(targetDate.getTime())) {
    document.getElementById('app').innerHTML = '<p class="error-msg">Invalid date.</p>';
    return;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const WEEKDAYS = ['\u65E5', '\u6708', '\u706B', '\u6C34', '\u6728', '\u91D1', '\u571F'];

  function formatEventDate(d) {
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = WEEKDAYS[d.getDay()];
    const h = String(d.getHours()).padStart(2, '0');
    return y + '\u5E74' + m + '\u6708' + day + '\u65E5(' + w + ') ' + h + ':00';
  }

  function formatWeatherDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return (d.getMonth() + 1) + '/' + d.getDate() + '(' + WEEKDAYS[d.getDay()] + ')';
  }

  const app = document.getElementById('app');
  app.innerHTML =
    '<div class="event-name">' + escapeHtml(name) + '</div>' +
    '<div class="event-date">' + formatEventDate(targetDate) + '</div>' +
    '<div id="countdown" class="countdown"></div>' +
    '<div id="weather-container" class="weather-section"></div>';

  // --- Countdown ---
  function update() {
    var now = new Date();
    var diff = targetDate - now;
    var el = document.getElementById('countdown');

    if (diff <= 0) {
      el.innerHTML = '<div class="finished">Event Started!<div class="sub">' + formatEventDate(targetDate) + '</div></div>';
      return;
    }

    var days = Math.floor(diff / 86400000);
    var hours = Math.floor((diff / 3600000) % 24);
    var minutes = Math.floor((diff / 60000) % 60);
    var seconds = Math.floor((diff / 1000) % 60);

    el.innerHTML =
      '<div class="unit"><div class="value">' + days + '</div><div class="label">Days</div></div>' +
      '<div class="separator">:</div>' +
      '<div class="unit"><div class="value">' + String(hours).padStart(2,'0') + '</div><div class="label">Hours</div></div>' +
      '<div class="separator">:</div>' +
      '<div class="unit"><div class="value">' + String(minutes).padStart(2,'0') + '</div><div class="label">Min</div></div>' +
      '<div class="separator">:</div>' +
      '<div class="unit"><div class="value">' + String(seconds).padStart(2,'0') + '</div><div class="label">Sec</div></div>';
  }

  update();
  setInterval(update, 1000);

  // --- Weather ---
  if (!location) return;

  var WMO = {
    0:['晴れ','☀️','clear'],1:['晴れ','🌤️','clear'],
    2:['曇り','⛅','cloudy'],3:['曇り','☁️','cloudy'],
    45:['霧','🌫️','fog'],48:['霧','🌫️','fog'],
    51:['小雨','🌦️','rain'],53:['雨','🌧️','rain'],55:['強い雨','🌧️','rain'],
    56:['凍雨','🌧️','rain'],57:['強い凍雨','🌧️','rain'],
    61:['小雨','🌦️','rain'],63:['雨','🌧️','rain'],65:['大雨','🌧️','rain'],
    66:['凍雨','🌧️','rain'],67:['強い凍雨','🌧️','rain'],
    71:['小雪','🌨️','snow'],73:['雪','❄️','snow'],75:['大雪','❄️','snow'],77:['雪','❄️','snow'],
    80:['にわか雨','🌦️','rain'],81:['雨','🌧️','rain'],82:['強い雨','⛈️','rain'],
    85:['にわか雪','🌨️','snow'],86:['強い雪','🌨️','snow'],
    95:['雷雨','⚡','storm'],96:['雷雨','⚡','storm'],99:['激しい雷雨','⚡','storm']
  };

  function getWmo(c){return WMO[c]||['不明','🌐','unknown'];}

  function summarizeHourly(codes) {
    var first = codes.slice(0, Math.ceil(codes.length / 2));
    var second = codes.slice(Math.ceil(codes.length / 2));
    function dom(arr) {
      var f = {};
      arr.forEach(function(c){var cat=getWmo(c)[2];f[cat]=(f[cat]||0)+1;});
      return Object.entries(f).sort(function(a,b){return b[1]-a[1];})[0][0];
    }
    var L={clear:'晴れ',cloudy:'曇り',rain:'雨',snow:'雪',storm:'雷雨',fog:'霧'};
    var I={clear:'☀️',cloudy:'☁️',rain:'🌧️',snow:'❄️',storm:'⚡',fog:'🌫️'};
    var c1=dom(first), c2=dom(second);
    if(c1===c2) return {desc:L[c1]||'不明',icon:I[c1]||'🌐'};
    return {desc:(L[c1]||'不明')+'のち'+(L[c2]||'不明'),icon:I[c1]||'🌐'};
  }

  (async function() {
    var container = document.getElementById('weather-container');
    try {
      var geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(location)+'&count=1&language=en');
      var geoData = await geoRes.json();
      if (!geoData.results||!geoData.results.length){container.innerHTML='<div class="weather-note">場所が見つかりません</div>';return;}

      var geo = geoData.results[0];
      var eventDateStr = date.slice(0,10);
      var now = new Date();
      var diffDays = Math.floor((targetDate-now)/86400000);

      if(diffDays>16){container.innerHTML='<div class="weather-note">'+escapeHtml(geo.name)+' の天気予報はイベント16日前から表示されます</div>';return;}
      if(diffDays<0) return;

      var wRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+geo.latitude+'&longitude='+geo.longitude+'&daily=temperature_2m_max,temperature_2m_min&hourly=weather_code&timezone='+encodeURIComponent(geo.timezone||'auto')+'&start_date='+eventDateStr+'&end_date='+eventDateStr);
      var wData = await wRes.json();
      if(!wData.daily||!wData.hourly){container.innerHTML='<div class="weather-note">天気データを取得できませんでした</div>';return;}

      var tMax=Math.round(wData.daily.temperature_2m_max[0]);
      var tMin=Math.round(wData.daily.temperature_2m_min[0]);
      var r=summarizeHourly(wData.hourly.weather_code.slice(6,18));
      var dl=formatWeatherDate(eventDateStr);

      container.innerHTML=
        '<div class="weather-info">'+
          '<span class="weather-icon">'+r.icon+'</span>'+
          '<span>'+dl+' '+escapeHtml(geo.name)+' '+r.desc+' '+tMin+'°/'+tMax+'°</span>'+
        '</div>';
    } catch(e) {
      container.innerHTML='<div class="weather-note">天気データを取得できませんでした</div>';
    }
  })();
})();
</script>
</body>
</html>
