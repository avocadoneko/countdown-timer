<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer - Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .header {
    padding: 32px 32px 24px;
    max-width: 720px;
    margin: 0 auto;
  }

  .header h1 { font-size: 1.4rem; font-weight: 800; color: #fff; }
  .header p { font-size: 0.8rem; color: #64748b; margin-top: 4px; }

  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .card h2 { font-size: 0.95rem; margin-bottom: 22px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Form */
  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; color: #94a3b8;
  }

  .form-group input, .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    background: rgba(255,255,255,0.06);
    color: #e2e8f0;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus {
    outline: none; border-color: rgba(255,255,255,0.3);
  }

  .form-group input::placeholder { color: #475569; }

  .date-hour-row { display: flex; gap: 10px; }
  .date-hour-row input[type="date"] { flex: 1; }
  .date-hour-row select { width: 110px; }

  /* Bg presets */
  .bg-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .bg-option {
    position: relative;
    aspect-ratio: 16/10;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    background-size: cover;
    background-position: center;
  }

  .bg-option:hover { transform: scale(1.03); }

  .bg-option.selected {
    border-color: #818cf8;
    box-shadow: 0 0 0 2px rgba(129,140,248,0.3);
  }

  .bg-option .bg-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 4px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    font-size: 0.65rem;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    text-align: center;
  }

  .bg-option.selected::after {
    content: '\2713';
    position: absolute;
    top: 6px; right: 8px;
    background: #818cf8;
    color: #fff;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
  }

  /* Upload area */
  .upload-area {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .upload-btn {
    padding: 8px 16px;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: #94a3b8;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.2s;
    white-space: nowrap;
  }

  .upload-btn:hover { border-color: rgba(255,255,255,0.4); }

  .upload-preview {
    width: 60px; height: 38px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    border: 2px solid #818cf8;
    display: none;
  }

  .upload-preview.show { display: block; }

  .upload-name {
    font-size: 0.75rem;
    color: #64748b;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .upload-clear {
    background: none; border: none;
    color: #ef4444; font-size: 0.75rem;
    cursor: pointer; font-weight: 600;
    display: none;
  }

  .upload-clear.show { display: inline; }

  .form-hint { font-size: 0.7rem; color: #475569; margin-top: 6px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border: none; border-radius: 10px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.1s; font-family: inherit;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover { background: #818cf8; }
  .btn-secondary { background: rgba(255,255,255,0.08); color: #cbd5e1; }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }
  .btn-danger { background: rgba(239,68,68,0.15); color: #f87171; font-size: 0.78rem; padding: 6px 12px; }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  .actions { display: flex; gap: 10px; margin-top: 4px; }

  /* Event list */
  .section-title { font-size: 0.85rem; margin-bottom: 14px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

  .event-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; flex-wrap: wrap;
  }

  .event-info { flex: 1; min-width: 180px; }
  .event-info .name { font-weight: 700; font-size: 1rem; color: #f1f5f9; }
  .event-info .date { font-size: 0.8rem; color: #64748b; margin-top: 2px; }

  .event-bg-thumb {
    width: 36px; height: 24px;
    border-radius: 6px;
    background-size: cover; background-position: center;
    border: 1px solid rgba(255,255,255,0.1);
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }

  .event-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .embed-url-area { margin-top: 14px; display: none; width: 100%; }
  .embed-url-area.show { display: block; }
  .embed-url-area label { font-size: 0.75rem; font-weight: 600; color: #64748b; display: block; margin-bottom: 4px; }
  .embed-url-row { display: flex; gap: 8px; }
  .embed-url-row input {
    flex: 1; padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    font-size: 0.75rem; font-family: 'SF Mono', monospace;
    background: rgba(0,0,0,0.3); color: #94a3b8;
  }

  .preview-frame {
    width: 100%; height: 260px;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    margin-top: 12px; background: #0f172a;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #6366f1; color: #fff; padding: 10px 24px; border-radius: 10px;
    font-size: 0.82rem; font-weight: 600; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }

  .empty-state { text-align: center; padding: 36px 20px; color: #475569; font-size: 0.85rem; }

  /* Location autocomplete */
  .location-wrapper { position: relative; }
  .location-suggestions {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-top: none;
    border-radius: 0 0 10px 10px; max-height: 180px; overflow-y: auto;
    z-index: 50; display: none;
  }
  .location-suggestions.show { display: block; }
  .location-suggestion {
    padding: 10px 14px; cursor: pointer; font-size: 0.85rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; justify-content: space-between; align-items: center;
  }
  .location-suggestion:last-child { border-bottom: none; }
  .location-suggestion:hover { background: rgba(255,255,255,0.06); }
  .location-suggestion .city-name { font-weight: 600; color: #e2e8f0; }
  .location-suggestion .city-detail { font-size: 0.72rem; color: #64748b; }

  @media (max-width: 500px) {
    .bg-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Countdown Timer</h1>
  <p>Create events and embed countdown timers in Notion</p>
</div>

<div class="main">
  <div class="card" id="form-card">
    <h2 id="form-title">New Event</h2>

    <div class="form-group">
      <label for="event-name">Event Name</label>
      <input type="text" id="event-name" placeholder="e.g. Summer Festival">
    </div>

    <div class="form-group">
      <label>Date &amp; Time</label>
      <div class="date-hour-row">
        <input type="date" id="event-date">
        <select id="event-hour"><option value="">-- Hour --</option></select>
      </div>
    </div>

    <div class="form-group">
      <label for="event-location">Location (optional)</label>
      <div class="location-wrapper">
        <input type="text" id="event-location" placeholder="e.g. Tokyo, New York" autocomplete="off">
        <div class="location-suggestions" id="location-suggestions"></div>
      </div>
    </div>

    <div class="form-group">
      <label>Background</label>
      <div class="bg-grid" id="bg-grid"></div>
      <div class="upload-area">
        <button type="button" class="upload-btn" id="upload-btn">Upload Image</button>
        <input type="file" id="file-input" accept="image/*" hidden>
        <div class="upload-preview" id="upload-preview"></div>
        <span class="upload-name" id="upload-name"></span>
        <button type="button" class="upload-clear" id="upload-clear">Remove</button>
      </div>
      <div class="form-hint">Or paste a direct image URL below</div>
    </div>

    <div class="form-group">
      <label for="event-bgurl">Custom Image URL (optional)</label>
      <input type="text" id="event-bgurl" placeholder="https://example.com/image.jpg">
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btn-save">Save</button>
      <button class="btn btn-secondary" id="btn-cancel" style="display:none;">Cancel</button>
    </div>
  </div>

  <div class="section-title">Saved Events</div>
  <div id="event-list">
    <div class="empty-state">No events yet.</div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
(function() {
  var STORAGE_KEY = 'countdown_events_v2';

  var PRESETS = [
    { key: 'ocean',    label: 'Ocean',    thumb: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300&q=60', full: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200&q=80' },
    { key: 'mountain', label: 'Mountain', thumb: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&q=60', full: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80' },
    { key: 'sunset',   label: 'Sunset',   thumb: 'https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=300&q=60', full: 'https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=1200&q=80' },
    { key: 'forest',   label: 'Forest',   thumb: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300&q=60', full: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200&q=80' },
    { key: 'aurora',   label: 'Aurora',   thumb: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=300&q=60', full: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1200&q=80' },
    { key: 'city',     label: 'City',     thumb: 'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=300&q=60', full: 'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=1200&q=80' }
  ];

  // Populate hour select
  var hourSelect = document.getElementById('event-hour');
  for (var h = 0; h < 24; h++) {
    var opt = document.createElement('option');
    opt.value = String(h).padStart(2, '0');
    opt.textContent = String(h).padStart(2, '0') + ':00';
    hourSelect.appendChild(opt);
  }

  // Render bg grid
  var bgGrid = document.getElementById('bg-grid');
  bgGrid.innerHTML = PRESETS.map(function(p) {
    return '<div class="bg-option' + (p.key === 'ocean' ? ' selected' : '') + '" data-key="' + p.key + '" style="background-image:url(' + p.thumb + ')"><div class="bg-label">' + p.label + '</div></div>';
  }).join('');

  var selectedBg = 'ocean';
  var uploadedData = null;

  bgGrid.addEventListener('click', function(e) {
    var opt = e.target.closest('.bg-option');
    if (!opt) return;
    bgGrid.querySelectorAll('.bg-option').forEach(function(o) { o.classList.remove('selected'); });
    opt.classList.add('selected');
    selectedBg = opt.dataset.key;
    uploadedData = null;
    uploadPreview.classList.remove('show');
    uploadClear.classList.remove('show');
    uploadName.textContent = '';
  });

  // File upload
  var uploadBtn = document.getElementById('upload-btn');
  var fileInput = document.getElementById('file-input');
  var uploadPreview = document.getElementById('upload-preview');
  var uploadName = document.getElementById('upload-name');
  var uploadClear = document.getElementById('upload-clear');

  uploadBtn.addEventListener('click', function() { fileInput.click(); });

  fileInput.addEventListener('change', function() {
    var file = fileInput.files[0];
    if (!file) return;
    compressImage(file, 1200, 0.7).then(function(dataUrl) {
      uploadedData = dataUrl;
      selectedBg = null;
      bgGrid.querySelectorAll('.bg-option').forEach(function(o) { o.classList.remove('selected'); });
      uploadPreview.style.backgroundImage = 'url(' + dataUrl + ')';
      uploadPreview.classList.add('show');
      uploadName.textContent = file.name;
      uploadClear.classList.add('show');
    });
  });

  uploadClear.addEventListener('click', function() {
    uploadedData = null;
    fileInput.value = '';
    uploadPreview.classList.remove('show');
    uploadName.textContent = '';
    uploadClear.classList.remove('show');
    // reselect first preset
    selectedBg = 'ocean';
    bgGrid.querySelector('[data-key="ocean"]').classList.add('selected');
  });

  function compressImage(file, maxW, quality) {
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var w = img.width, ht = img.height;
          if (w > maxW) { ht = ht * maxW / w; w = maxW; }
          canvas.width = w; canvas.height = ht;
          canvas.getContext('2d').drawImage(img, 0, 0, w, ht);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function loadEvents() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveEventsData(events) { localStorage.setItem(STORAGE_KEY, JSON.stringify(events)); }

  function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function formatDate(dateStr, hour) {
    var d = new Date(dateStr + 'T' + hour + ':00');
    return d.toLocaleString('ja-JP', { year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit' });
  }

  function getEmbedUrl(ev) {
    var base = new URL('embed.html', window.location.href).href;
    var p = { name: ev.name, date: ev.date + 'T' + ev.hour + ':00' };
    if (ev.location) p.location = ev.location;
    if (ev.bgimage) {
      p.bgimage = ev.bgimage;
    } else if (ev.bgPreset) {
      p.bg = ev.bgPreset;
    }
    return base + '?' + new URLSearchParams(p).toString();
  }

  function getBgThumbUrl(ev) {
    if (ev.bgimage) return ev.bgimage;
    var preset = PRESETS.find(function(p) { return p.key === ev.bgPreset; });
    return preset ? preset.thumb : PRESETS[0].thumb;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  var editingId = null;
  var nameInput = document.getElementById('event-name');
  var dateInput = document.getElementById('event-date');
  var locationInput = document.getElementById('event-location');
  var bgurlInput = document.getElementById('event-bgurl');
  var suggestionsEl = document.getElementById('location-suggestions');
  var btnSave = document.getElementById('btn-save');
  var btnCancel = document.getElementById('btn-cancel');
  var formTitle = document.getElementById('form-title');
  var eventList = document.getElementById('event-list');
  var toast = document.getElementById('toast');

  // Location autocomplete
  var debounceTimer = null;
  locationInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    var q = locationInput.value.trim();
    if (q.length < 2) { suggestionsEl.classList.remove('show'); return; }
    debounceTimer = setTimeout(function() { fetchSuggestions(q); }, 300);
  });
  locationInput.addEventListener('keydown', function(e) { if (e.key === 'Escape') suggestionsEl.classList.remove('show'); });
  document.addEventListener('click', function(e) { if (!e.target.closest('.location-wrapper')) suggestionsEl.classList.remove('show'); });

  async function fetchSuggestions(query) {
    try {
      var res = await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(query)+'&count=5&language=en');
      var data = await res.json();
      if (!data.results||!data.results.length) { suggestionsEl.classList.remove('show'); return; }
      suggestionsEl.innerHTML = data.results.map(function(r) {
        var parts = [r.admin1, r.country].filter(Boolean);
        return '<div class="location-suggestion" data-name="'+escapeHtml(r.name)+', '+escapeHtml(r.country||'')+'"><span class="city-name">'+escapeHtml(r.name)+'</span><span class="city-detail">'+escapeHtml(parts.join(', '))+'</span></div>';
      }).join('');
      suggestionsEl.classList.add('show');
    } catch(e) { suggestionsEl.classList.remove('show'); }
  }

  suggestionsEl.addEventListener('click', function(e) {
    var item = e.target.closest('.location-suggestion');
    if (item) { locationInput.value = item.dataset.name; suggestionsEl.classList.remove('show'); }
  });

  function showToast(msg) {
    toast.textContent = msg || 'Copied!';
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1600);
  }

  function render() {
    var events = loadEvents();
    if (!events.length) { eventList.innerHTML = '<div class="empty-state">No events yet.</div>'; return; }
    eventList.innerHTML = events.map(function(ev) {
      return '<div class="event-item" data-id="'+ev.id+'">'+
        '<div class="event-info">'+
          '<div class="name"><span class="event-bg-thumb" style="background-image:url('+escapeHtml(getBgThumbUrl(ev))+')"></span>'+escapeHtml(ev.name)+'</div>'+
          '<div class="date">'+formatDate(ev.date,ev.hour)+(ev.location?' / '+escapeHtml(ev.location):'')+'</div>'+
        '</div>'+
        '<div class="event-actions">'+
          '<button class="btn btn-secondary btn-embed" data-id="'+ev.id+'">Embed URL</button>'+
          '<button class="btn btn-secondary btn-preview" data-id="'+ev.id+'">Preview</button>'+
          '<button class="btn btn-secondary btn-edit" data-id="'+ev.id+'">Edit</button>'+
          '<button class="btn btn-danger btn-delete" data-id="'+ev.id+'">Delete</button>'+
        '</div>'+
        '<div class="embed-url-area" id="embed-'+ev.id+'">'+
          '<label>Notion embed URL:</label>'+
          '<div class="embed-url-row">'+
            '<input type="text" readonly value="'+escapeHtml(getEmbedUrl(ev))+'">'+
            '<button class="btn btn-secondary btn-copy" data-id="'+ev.id+'">Copy</button>'+
          '</div>'+
          '<iframe class="preview-frame" id="preview-frame-'+ev.id+'" style="display:none;"></iframe>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  function resetForm() {
    editingId = null;
    nameInput.value = '';
    dateInput.value = '';
    hourSelect.value = '';
    locationInput.value = '';
    bgurlInput.value = '';
    uploadedData = null;
    fileInput.value = '';
    uploadPreview.classList.remove('show');
    uploadName.textContent = '';
    uploadClear.classList.remove('show');
    selectedBg = 'ocean';
    bgGrid.querySelectorAll('.bg-option').forEach(function(o) { o.classList.toggle('selected', o.dataset.key === 'ocean'); });
    formTitle.textContent = 'New Event';
    btnSave.textContent = 'Save';
    btnCancel.style.display = 'none';
  }

  btnSave.addEventListener('click', function() {
    var name = nameInput.value.trim();
    var date = dateInput.value;
    var hour = hourSelect.value;
    var location = locationInput.value.trim();
    var bgurl = bgurlInput.value.trim();

    if (!name || !date || !hour) { showToast('Name, date, and hour are required'); return; }

    var bgPreset = null;
    var bgimage = null;

    if (uploadedData) {
      bgimage = uploadedData;
    } else if (bgurl) {
      bgimage = bgurl;
    } else {
      bgPreset = selectedBg || 'ocean';
    }

    var events = loadEvents();

    if (editingId) {
      var idx = events.findIndex(function(e) { return e.id === editingId; });
      if (idx !== -1) {
        events[idx] = { id: editingId, name:name, date:date, hour:hour, location:location, bgPreset:bgPreset, bgimage:bgimage };
      }
    } else {
      events.push({ id: generateId(), name:name, date:date, hour:hour, location:location, bgPreset:bgPreset, bgimage:bgimage });
    }

    saveEventsData(events);
    resetForm();
    render();
    showToast(editingId ? 'Updated!' : 'Saved!');
  });

  btnCancel.addEventListener('click', resetForm);

  eventList.addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var id = btn.dataset.id;
    var events = loadEvents();

    if (btn.classList.contains('btn-embed')) {
      var area = document.getElementById('embed-' + id);
      area.classList.toggle('show');
      var frame = document.getElementById('preview-frame-' + id);
      if (frame) frame.style.display = 'none';
    }

    if (btn.classList.contains('btn-copy')) {
      var ev = events.find(function(e) { return e.id === id; });
      if (ev) navigator.clipboard.writeText(getEmbedUrl(ev)).then(function() { showToast('Copied!'); });
    }

    if (btn.classList.contains('btn-preview')) {
      document.getElementById('embed-' + id).classList.add('show');
      var frame = document.getElementById('preview-frame-' + id);
      var ev = events.find(function(e) { return e.id === id; });
      if (frame && ev) {
        frame.style.display = frame.style.display === 'none' ? 'block' : 'none';
        if (frame.style.display === 'block') frame.src = getEmbedUrl(ev);
      }
    }

    if (btn.classList.contains('btn-edit')) {
      var ev = events.find(function(e) { return e.id === id; });
      if (ev) {
        editingId = ev.id;
        nameInput.value = ev.name;
        dateInput.value = ev.date;
        hourSelect.value = ev.hour;
        locationInput.value = ev.location || '';
        bgurlInput.value = '';

        bgGrid.querySelectorAll('.bg-option').forEach(function(o) { o.classList.remove('selected'); });
        uploadedData = null;
        uploadPreview.classList.remove('show');
        uploadName.textContent = '';
        uploadClear.classList.remove('show');

        if (ev.bgPreset) {
          selectedBg = ev.bgPreset;
          var s = bgGrid.querySelector('[data-key="'+ev.bgPreset+'"]');
          if (s) s.classList.add('selected');
        } else if (ev.bgimage && ev.bgimage.startsWith('data:')) {
          uploadedData = ev.bgimage;
          uploadPreview.style.backgroundImage = 'url(' + ev.bgimage + ')';
          uploadPreview.classList.add('show');
          uploadName.textContent = 'Uploaded image';
          uploadClear.classList.add('show');
          selectedBg = null;
        } else if (ev.bgimage) {
          bgurlInput.value = ev.bgimage;
          selectedBg = null;
        }

        formTitle.textContent = 'Edit Event';
        btnSave.textContent = 'Update';
        btnCancel.style.display = 'inline-flex';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    if (btn.classList.contains('btn-delete')) {
      var ev = events.find(function(e) { return e.id === id; });
      if (ev && confirm('"'+ev.name+'" を削除しますか?')) {
        saveEventsData(events.filter(function(e) { return e.id !== id; }));
        render();
        if (editingId === id) resetForm();
        showToast('Deleted');
      }
    }
  });

  render();
})();
</script>
</body>
</html>
